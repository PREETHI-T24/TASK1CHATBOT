<!DOCTYPE html>
<html>
<head>
    <title>Rule-Based Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Rule-Based Chatbot</h1>

    <form method="POST">
        <input type="text" name="message" placeholder="Ask your question..." required>
        <button type="submit">Send</button>
    </form>

    {% if response %}
    <div class="reply">
        <h3>ChatBot Response:</h3>
        <p>{{ response }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
